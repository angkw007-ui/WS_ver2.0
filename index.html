<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#4361ee">
    <title>📅 캘린더 스케줄러</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee; --primary-light: #edf2ff; --primary-hover: #3a56d4;
            --accent: #f72585; --success: #2dc653; --warning: #ff9f1c;
            --bg: #f8f9fa; --card: #ffffff; --text: #212529;
            --text-light: #868e96; --border: #e9ecef;
            --radius: 16px;
            --shadow: 0 4px 24px rgba(0,0,0,0.06);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Pretendard', -apple-system, 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh;
            transition: background 0.3s;
        }

        /* ===== 위젯 모드 ===== */
        body.widget-mode {
            background: rgba(255,255,255,0.92) !important;
            backdrop-filter: blur(20px);
            border-radius: 20px; overflow: hidden;
            max-width: 400px; max-height: 500px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            border: 1px solid rgba(255,255,255,0.4);
        }
        body.widget-mode .app-container { padding: 10px; }
        body.widget-mode .page-header { padding: 8px 0; }
        body.widget-mode .page-header h1 { font-size: 16px; }
        body.widget-mode .sidebar { display: none; }
        body.widget-mode .main-content { margin-left: 0; }
        body.widget-mode .calendar-day { min-height: 44px; padding: 3px; }
        body.widget-mode .event-pill { font-size: 8px; padding: 1px 3px; }
        body.widget-mode .day-number { font-size: 10px; }
        body.widget-mode .fab, body.widget-mode .bottom-nav { display: none; }
        body.widget-mode .cal-header h2 { font-size: 15px; }
        body.widget-mode .cal-nav-btn { width: 28px; height: 28px; font-size: 11px; }
        body.widget-mode .today-btn { height: 28px; font-size: 11px; padding: 0 10px; }
        body.widget-mode .view-tabs { display: none; }
        body.widget-mode .config-panel { display: none; }
        body.widget-mode .card { padding: 12px; margin-bottom: 8px; }

        .app-container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* ===== 설정 패널 ===== */
        .config-panel {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: var(--radius); padding: 20px;
            margin-bottom: 16px; color: white;
            display: none;
        }
        .config-panel.show { display: block; }
        .config-panel h3 { font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .config-input-group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .config-input {
            flex: 1; min-width: 200px; padding: 10px 14px;
            border: 2px solid rgba(255,255,255,0.3); border-radius: 10px;
            background: rgba(255,255,255,0.15); color: white;
            font-size: 13px; font-family: inherit; outline: none;
        }
        .config-input::placeholder { color: rgba(255,255,255,0.6); }
        .config-input:focus { border-color: white; background: rgba(255,255,255,0.25); }
        .config-btn {
            padding: 10px 20px; border: 2px solid white; border-radius: 10px;
            background: white; color: #667eea; font-size: 13px; font-weight: 700;
            cursor: pointer; white-space: nowrap; transition: all 0.2s;
        }
        .config-btn:hover { background: rgba(255,255,255,0.9); }
        .config-status {
            margin-top: 10px; font-size: 12px;
            display: flex; align-items: center; gap: 6px;
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .status-dot.connected { background: #51cf66; box-shadow: 0 0 6px #51cf66; }
        .status-dot.disconnected { background: #ff6b6b; }

        /* ===== 헤더 ===== */
        .page-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 0 20px;
        }
        .page-header h1 {
            font-size: 24px; font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .header-actions { display: flex; gap: 6px; align-items: center; }
        .icon-btn {
            width: 40px; height: 40px; border: none; border-radius: 12px;
            background: var(--card); color: var(--text); font-size: 16px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: var(--shadow); transition: all 0.2s;
        }
        .icon-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        .icon-btn.active { background: var(--primary); color: white; }
        .sync-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ===== 레이아웃 ===== */
        .layout { display: flex; gap: 20px; }
        .sidebar { width: 260px; flex-shrink: 0; }
        .main-content { flex: 1; min-width: 0; }
        .card {
            background: var(--card); border-radius: var(--radius);
            padding: 20px; box-shadow: var(--shadow); margin-bottom: 16px;
        }
        .card-title {
            font-size: 13px; font-weight: 700; color: var(--text-light);
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px;
        }

        /* ===== 미니 캘린더 ===== */
        .mini-cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .mini-cal-header span { font-size: 15px; font-weight: 700; }
        .mini-cal-nav {
            background: none; border: none; cursor: pointer;
            width: 28px; height: 28px; border-radius: 8px;
            color: var(--text-light); font-size: 13px;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .mini-cal-nav:hover { background: var(--primary-light); color: var(--primary); }
        .mini-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; gap: 2px; }
        .mini-cal-dow { font-size: 11px; font-weight: 600; color: var(--text-light); padding: 4px 0; }
        .mini-cal-day {
            font-size: 12px; padding: 5px 0; border-radius: 8px; cursor: pointer;
            transition: all 0.15s; position: relative;
        }
        .mini-cal-day:hover { background: var(--primary-light); }
        .mini-cal-day.today { background: var(--primary); color: white; font-weight: 700; }
        .mini-cal-day.selected { outline: 2px solid var(--primary); outline-offset: -2px; }
        .mini-cal-day.other-month { color: #ced4da; }
        .mini-cal-day .dot-indicator { position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); display: flex; gap: 2px; }
        .mini-dot { width: 3px; height: 3px; border-radius: 50%; }

        /* ===== 오늘 일정 ===== */
        .today-schedule-item {
            display: flex; gap: 10px; padding: 10px 0;
            border-bottom: 1px solid var(--border); cursor: pointer; transition: all 0.2s;
        }
        .today-schedule-item:last-child { border: none; }
        .today-schedule-item:hover { padding-left: 6px; }
        .schedule-time-badge { font-size: 11px; font-weight: 700; color: var(--primary); min-width: 50px; padding-top: 2px; }
        .schedule-info h4 { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
        .schedule-info p { font-size: 11px; color: var(--text-light); }

        /* ===== 통계 ===== */
        .stats-row { display: flex; gap: 8px; }
        .stat-item { flex: 1; text-align: center; padding: 10px 8px; background: var(--bg); border-radius: 10px; }
        .stat-num { font-size: 20px; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 10px; color: var(--text-light); font-weight: 600; margin-top: 2px; }

        /* ===== 메인 캘린더 ===== */
        .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .cal-header h2 { font-size: 22px; font-weight: 800; }
        .cal-nav-group { display: flex; gap: 6px; align-items: center; }
        .cal-nav-btn {
            width: 36px; height: 36px; border: none; border-radius: 10px;
            background: var(--primary-light); color: var(--primary);
            font-size: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .cal-nav-btn:hover { background: var(--primary); color: white; }
        .today-btn {
            padding: 0 14px; height: 36px; border: none; border-radius: 10px;
            background: var(--primary); color: white; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .today-btn:hover { background: var(--primary-hover); }
        .view-tabs { display: flex; gap: 4px; }
        .view-tab {
            padding: 6px 14px; border: none; border-radius: 8px;
            background: transparent; color: var(--text-light);
            font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .view-tab.active { background: var(--primary); color: white; }

        .cal-dow-row { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 4px; }
        .cal-dow { font-size: 12px; font-weight: 700; color: var(--text-light); padding: 8px 0; }
        .cal-dow:first-child { color: var(--accent); }
        .cal-dow:last-child { color: var(--primary); }

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .calendar-day {
            min-height: 88px; padding: 6px 8px; border-radius: 10px; cursor: pointer;
            transition: all 0.2s; position: relative;
            background: var(--card); border: 2px solid transparent;
        }
        .calendar-day:hover { border-color: var(--primary-light); transform: scale(1.02); z-index: 2; }
        .calendar-day.today { border-color: var(--primary); background: var(--primary-light); }
        .calendar-day.selected { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(67,97,238,0.15); }
        .calendar-day.other-month { opacity: 0.35; }
        .day-number { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
        .calendar-day:nth-child(7n+1) .day-number { color: var(--accent); }
        .calendar-day:nth-child(7n) .day-number { color: var(--primary); }
        .calendar-day.today .day-number {
            background: var(--primary); color: white !important;
            width: 24px; height: 24px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .event-pill {
            font-size: 10px; font-weight: 600; padding: 2px 6px;
            border-radius: 4px; margin-bottom: 2px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            cursor: pointer; display: block;
        }
        .event-pill.color-blue { background: #dbe4ff; color: #364fc7; }
        .event-pill.color-red { background: #ffe3e3; color: #c92a2a; }
        .event-pill.color-green { background: #d3f9d8; color: #2b8a3e; }
        .event-pill.color-yellow { background: #fff3bf; color: #e67700; }
        .event-pill.color-purple { background: #e5dbff; color: #6741d9; }
        .more-events { font-size: 10px; color: var(--text-light); font-weight: 600; padding: 2px 0; }

        /* ===== 주간 뷰 ===== */
        .week-view { display: none; }
        .week-view.active { display: block; }
        .week-grid {
            display: grid; grid-template-columns: 50px repeat(7, 1fr);
            border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
        }
        .week-time-label {
            font-size: 10px; color: var(--text-light); padding: 6px 4px;
            border-bottom: 1px solid var(--border); text-align: right;
            height: 44px; display: flex; align-items: flex-start; justify-content: flex-end;
        }
        .week-cell {
            border-bottom: 1px solid var(--border); border-left: 1px solid var(--border);
            height: 44px; padding: 2px; cursor: pointer;
        }
        .week-cell:hover { background: var(--primary-light); }
        .week-day-header {
            text-align: center; padding: 8px 0; font-size: 11px; font-weight: 700;
            border-bottom: 1px solid var(--border); border-left: 1px solid var(--border); background: #fafbfc;
        }
        .week-day-header.today { color: var(--primary); background: var(--primary-light); }

        /* ===== 모달 ===== */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
            z-index: 1000; display: none;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: white; border-radius: 20px;
            width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto;
            box-shadow: var(--shadow-lg); animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal-header { padding: 24px 24px 0; display: flex; justify-content: space-between; align-items: flex-start; }
        .modal-date { font-size: 28px; font-weight: 800; color: var(--primary); }
        .modal-day-label { font-size: 13px; color: var(--text-light); font-weight: 600; }
        .modal-close {
            width: 36px; height: 36px; border: none; border-radius: 10px;
            background: var(--bg); color: var(--text-light); font-size: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-close:hover { background: #ffe3e3; color: var(--accent); }
        .modal-body { padding: 20px 24px; }
        .modal-section-title {
            font-size: 12px; font-weight: 700; color: var(--text-light);
            text-transform: uppercase; letter-spacing: 0.5px;
            margin: 16px 0 10px; display: flex; align-items: center; gap: 6px;
        }
        .modal-event {
            display: flex; gap: 12px; padding: 14px;
            background: var(--bg); border-radius: 12px;
            margin-bottom: 8px; transition: all 0.2s; cursor: pointer;
        }
        .modal-event:hover { transform: translateX(4px); box-shadow: var(--shadow); }
        .modal-event-color { width: 4px; border-radius: 4px; flex-shrink: 0; }
        .modal-event-content { flex: 1; }
        .modal-event-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
        .modal-event-time { font-size: 12px; color: var(--text-light); margin-bottom: 4px; }
        .modal-event-desc { font-size: 12px; color: var(--text-light); line-height: 1.5; }
        .modal-event-status { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; display: inline-block; margin-top: 6px; }
        .status-todo { background: #fff3bf; color: #e67700; }
        .status-progress { background: #dbe4ff; color: #364fc7; }
        .status-done { background: #d3f9d8; color: #2b8a3e; }

        .modal-footer { padding: 0 24px 24px; }
        .add-event-btn {
            width: 100%; padding: 12px; border: 2px dashed var(--border); border-radius: 12px;
            background: transparent; color: var(--text-light); font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .add-event-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

        .event-form { display: none; }
        .event-form.show { display: block; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-light); margin-bottom: 4px; }
        .form-input {
            width: 100%; padding: 10px 12px; border: 2px solid var(--border);
            border-radius: 10px; font-size: 14px; font-family: inherit;
            transition: border-color 0.2s; outline: none;
        }
        .form-input:focus { border-color: var(--primary); }
        .form-row { display: flex; gap: 8px; }
        .form-row .form-group { flex: 1; }
        .color-picker { display: flex; gap: 6px; }
        .color-opt {
            width: 28px; height: 28px; border-radius: 50%; border: 3px solid transparent;
            cursor: pointer; transition: all 0.2s;
        }
        .color-opt:hover, .color-opt.selected { border-color: var(--text); transform: scale(1.15); }
        .form-actions { display: flex; gap: 8px; margin-top: 16px; }
        .btn-save {
            flex: 1; padding: 10px; border: none; border-radius: 10px;
            background: var(--primary); color: white; font-size: 14px; font-weight: 700;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-save:hover { background: var(--primary-hover); }
        .btn-cancel {
            padding: 10px 16px; border: none; border-radius: 10px;
            background: var(--bg); color: var(--text-light); font-size: 14px; font-weight: 600; cursor: pointer;
        }

        /* ===== FAB ===== */
        .fab {
            position: fixed; bottom: 24px; right: 24px;
            width: 56px; height: 56px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; border: none; font-size: 22px;
            cursor: pointer; box-shadow: 0 6px 20px rgba(67,97,238,0.4);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s; z-index: 100;
        }
        .fab:hover { transform: scale(1.1) rotate(90deg); }

        .toast {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
            background: var(--text); color: white; padding: 12px 24px;
            border-radius: 12px; font-size: 13px; font-weight: 600;
            box-shadow: var(--shadow-lg); z-index: 2000;
            opacity: 0; transition: all 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; bottom: 100px; }

        /* ===== 모바일 하단 네비 ===== */
        .bottom-nav {
            display: none; position: fixed; bottom: 0; left: 0; right: 0;
            background: white; border-top: 1px solid var(--border);
            padding: 8px 0 env(safe-area-inset-bottom, 8px); z-index: 500;
        }
        .bottom-nav-inner { display: flex; justify-content: space-around; max-width: 500px; margin: 0 auto; }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            gap: 2px; padding: 4px 12px; border: none; background: none;
            color: var(--text-light); font-size: 10px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .nav-item i { font-size: 18px; }
        .nav-item.active { color: var(--primary); }

        /* ===== 로딩 ===== */
        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.8); z-index: 3000;
            display: none; align-items: center; justify-content: center;
        }
        .loading-overlay.show { display: flex; }
        .loading-spinner {
            width: 40px; height: 40px; border: 4px solid var(--border);
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* ===== 반응형 ===== */
        @media (max-width: 900px) {
            .sidebar { width: 220px; }
            .calendar-day { min-height: 70px; }
        }
        @media (max-width: 768px) {
            .app-container { padding: 10px; padding-bottom: 80px; }
            .page-header h1 { font-size: 18px; }
            .layout { flex-direction: column; }
            .sidebar { width: 100%; order: 2; }
            .main-content { order: 1; }
            .bottom-nav { display: block; }
            .fab { bottom: 80px; right: 16px; width: 48px; height: 48px; font-size: 18px; }
            .calendar-day { min-height: 52px; padding: 4px; }
            .day-number { font-size: 11px; }
            .event-pill { font-size: 9px; padding: 1px 4px; }
            .cal-header h2 { font-size: 17px; }
            .modal { max-width: 100%; border-radius: 20px 20px 0 0; margin-top: auto; }
            .modal-overlay { align-items: flex-end; padding: 0; }
            .sidebar-mobile-hidden { display: none !important; }
            .config-panel { margin: 0 0 12px; }
            .config-input-group { flex-direction: column; }
            .config-input { min-width: 0; width: 100%; }
        }

        /* ===== 다크모드 ===== */
        body.dark { --bg: #1a1b1e; --card: #25262b; --text: #e9ecef; --text-light: #868e96; --border: #373A40; --primary-light: rgba(67,97,238,0.15); }
        body.dark .modal { background: #25262b; }
        body.dark .modal-event { background: #1a1b1e; }
        body.dark .form-input { background: #1a1b1e; color: #e9ecef; }
        body.dark .icon-btn { background: #25262b; color: #e9ecef; }
        body.dark .bottom-nav { background: #25262b; border-color: #373a40; }
        body.dark .week-day-header { background: #2c2e33; }
        body.dark .loading-overlay { background: rgba(26,27,30,0.8); }
        body.dark.widget-mode { background: rgba(37,38,43,0.95) !important; border-color: rgba(55,58,64,0.4); }
    </style>
</head>
<body>
    <!-- 로딩 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <div class="app-container">
        <!-- 헤더 -->
        <header class="page-header">
            <h1><i class="fas fa-calendar-check"></i> 캘린더 스케줄러</h1>
            <div class="header-actions">
                <button class="icon-btn" onclick="syncFromSheet()" title="구글시트 동기화" id="syncBtn"><i class="fas fa-sync-alt"></i></button>
                <button class="icon-btn" onclick="toggleConfig()" title="설정"><i class="fas fa-gear"></i></button>
                <button class="icon-btn" id="widgetBtn" onclick="toggleWidget()" title="위젯 모드"><i class="fas fa-window-restore"></i></button>
                <button class="icon-btn" id="darkBtn" onclick="toggleDark()" title="다크모드"><i class="fas fa-moon"></i></button>
            </div>
        </header>

        <!-- 구글시트 설정 -->
        <div class="config-panel" id="configPanel">
            <h3><i class="fas fa-link"></i> 구글 시트 연결</h3>
            <div class="config-input-group">
                <input class="config-input" id="gasUrl" placeholder="Apps Script 웹 앱 URL을 붙여넣으세요" />
                <button class="config-btn" onclick="saveGasUrl()"><i class="fas fa-plug"></i> 연결</button>
            </div>
            <div class="config-status" id="configStatus">
                <div class="status-dot disconnected" id="statusDot"></div>
                <span id="statusText">연결 안됨 — URL을 입력하세요</span>
            </div>
        </div>

        <!-- 레이아웃 -->
        <div class="layout">
            <aside class="sidebar sidebar-mobile-hidden" id="sidebar">
                <div class="card">
                    <div class="mini-cal-header">
                        <button class="mini-cal-nav" onclick="miniCalNav(-1)"><i class="fas fa-chevron-left"></i></button>
                        <span id="miniCalTitle"></span>
                        <button class="mini-cal-nav" onclick="miniCalNav(1)"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    <div class="mini-cal-grid" id="miniCalGrid"></div>
                </div>
                <div class="card">
                    <div class="card-title"><i class="fas fa-clock"></i> 오늘의 일정</div>
                    <div id="todaySchedule"></div>
                </div>
                <div class="card">
                    <div class="card-title"><i class="fas fa-chart-pie"></i> 이번 달 통계</div>
                    <div class="stats-row" id="statsRow"></div>
                </div>
            </aside>

            <main class="main-content">
                <div class="card">
                    <div class="cal-header">
                        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                            <h2 id="calTitle"></h2>
                            <div class="cal-nav-group">
                                <button class="cal-nav-btn" onclick="calNav(-1)"><i class="fas fa-chevron-left"></i></button>
                                <button class="today-btn" onclick="goToday()">오늘</button>
                                <button class="cal-nav-btn" onclick="calNav(1)"><i class="fas fa-chevron-right"></i></button>
                            </div>
                        </div>
                        <div class="view-tabs">
                            <button class="view-tab active" onclick="setView('month',this)">월</button>
                            <button class="view-tab" onclick="setView('week',this)">주</button>
                        </div>
                    </div>
                    <div id="monthView">
                        <div class="cal-dow-row">
                            <div class="cal-dow">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div>
                            <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div><div class="cal-dow">토</div>
                        </div>
                        <div class="cal-grid" id="calGrid"></div>
                    </div>
                    <div class="week-view" id="weekView">
                        <div class="week-grid" id="weekGrid"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <button class="fab" onclick="openAddModal()" title="새 일정"><i class="fas fa-plus"></i></button>

    <nav class="bottom-nav">
        <div class="bottom-nav-inner">
            <button class="nav-item active" onclick="switchTab('cal',this)"><i class="fas fa-calendar"></i>캘린더</button>
            <button class="nav-item" onclick="switchTab('today',this)"><i class="fas fa-sun"></i>오늘</button>
            <button class="nav-item" onclick="switchTab('stats',this)"><i class="fas fa-chart-bar"></i>통계</button>
            <button class="nav-item" onclick="toggleDark()"><i class="fas fa-moon"></i>테마</button>
        </div>
    </nav>

    <!-- 날짜 모달 -->
    <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
        <div class="modal" id="modal">
            <div class="modal-header">
                <div>
                    <div class="modal-date" id="modalDate"></div>
                    <div class="modal-day-label" id="modalDayLabel"></div>
                </div>
                <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="add-event-btn" onclick="toggleEventForm()"><i class="fas fa-plus"></i> 새 일정 추가</button>
                <div class="event-form" id="eventForm">
                    <div class="form-group"><label>일정 제목</label><input class="form-input" id="formTitle" placeholder="일정을 입력하세요"></div>
                    <div class="form-row">
                        <div class="form-group"><label>시작</label><input class="form-input" id="formStart" type="time" value="09:00"></div>
                        <div class="form-group"><label>종료</label><input class="form-input" id="formEnd" type="time" value="10:00"></div>
                    </div>
                    <div class="form-group"><label>설명</label><input class="form-input" id="formDesc" placeholder="설명 (선택)"></div>
                    <div class="form-group">
                        <label>색상</label>
                        <div class="color-picker">
                            <div class="color-opt selected" style="background:#4361ee" data-color="blue" onclick="pickColor(this)"></div>
                            <div class="color-opt" style="background:#f72585" data-color="red" onclick="pickColor(this)"></div>
                            <div class="color-opt" style="background:#2dc653" data-color="green" onclick="pickColor(this)"></div>
                            <div class="color-opt" style="background:#ff9f1c" data-color="yellow" onclick="pickColor(this)"></div>
                            <div class="color-opt" style="background:#7048e8" data-color="purple" onclick="pickColor(this)"></div>
                        </div>
                    </div>
                    <div class="form-group"><label>상태</label>
                        <select class="form-input" id="formStatus">
                            <option value="todo">예정</option><option value="progress">진행중</option><option value="done">완료</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button class="btn-cancel" onclick="toggleEventForm()">취소</button>
                        <button class="btn-save" onclick="saveEvent()"><i class="fas fa-check"></i> 저장</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 이벤트 상세 모달 -->
    <div class="modal-overlay" id="eventDetailOverlay" onclick="if(event.target===this)closeEventDetailModal()">
        <div class="modal" style="max-width:420px;">
            <div class="modal-header"><div id="eventDetailHeader"></div>
                <button class="modal-close" onclick="closeEventDetailModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="eventDetailBody"></div>
            <div class="modal-footer" style="display:flex;gap:8px;">
                <button class="btn-cancel" style="flex:1;" onclick="deleteEvent()"><i class="fas fa-trash"></i> 삭제</button>
                <button class="btn-save" style="flex:1;" onclick="closeEventDetailModal()">확인</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    /* ══════════════════════════════════════════════
       📌 상태 & 설정
    ══════════════════════════════════════════════ */
    let events = JSON.parse(localStorage.getItem('calEvents') || '[]');
    let GAS_URL = localStorage.getItem('gasUrl') || '';
    let currentYear, currentMonth, selectedDate, currentView = 'month';
    let miniYear, miniMonth, selectedColor = 'blue', viewingEventId = null;

    /* ══════════════════════════════════════════════
       📌 구글 시트 API
    ══════════════════════════════════════════════ */
    function showLoading(v) {
        document.getElementById('loadingOverlay').classList.toggle('show', v);
    }

    async function apiCall(params) {
        if (!GAS_URL) return null;
        try {
            const url = new URL(GAS_URL);
            Object.keys(params).forEach(k => url.searchParams.append(k, params[k]));
            const res = await fetch(url.toString());
            return await res.json();
        } catch (e) {
            console.error('API Error:', e);
            return null;
        }
    }

    async function syncFromSheet() {
        if (!GAS_URL) { toggleConfig(); return; }
        const btn = document.getElementById('syncBtn');
        btn.querySelector('i').classList.add('sync-spin');
        showLoading(true);

        try {
            const result = await apiCall({ action: 'read' });
            if (result && result.success) {
                events = result.data;
                localStorage.setItem('calEvents', JSON.stringify(events));
                renderAll();
                showToast('✅ 구글 시트에서 동기화 완료!');
            } else {
                showToast('⚠️ 동기화 실패. URL을 확인하세요');
            }
        } catch (e) {
            showToast('❌ 연결 오류');
        }
        btn.querySelector('i').classList.remove('sync-spin');
        showLoading(false);
    }

    async function syncToSheet(action, eventData) {
        if (!GAS_URL) return;
        try {
            await apiCall({ action, ...eventData });
        } catch (e) { console.error('Sync error:', e); }
    }

    function saveGasUrl() {
        const url = document.getElementById('gasUrl').value.trim();
        if (!url) { showToast('URL을 입력하세요'); return; }
        GAS_URL = url;
        localStorage.setItem('gasUrl', url);
        document.getElementById('statusDot').className = 'status-dot connected';
        document.getElementById('statusText').textContent = '연결됨 ✓';
        showToast('🔗 연결 완료! 동기화 버튼을 눌러주세요');
        syncFromSheet();
    }

    function toggleConfig() {
        const p = document.getElementById('configPanel');
        p.classList.toggle('show');
        if (GAS_URL) document.getElementById('gasUrl').value = GAS_URL;
    }

    /* ══════════════════════════════════════════════
       📌 유틸리티
    ══════════════════════════════════════════════ */
    function fmt(y,m,d) {
        const date = new Date(y,m,d);
        return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
    }
    function saveData() { localStorage.setItem('calEvents', JSON.stringify(events)); }
    function getEvents(dateStr) { return events.filter(e => e.date === dateStr).sort((a,b) => (a.start||'').localeCompare(b.start||'')); }
    const COLORS = {blue:'#4361ee',red:'#f72585',green:'#2dc653',yellow:'#ff9f1c',purple:'#7048e8'};
    const STATUS_MAP = {todo:['예정','status-todo'], progress:['진행중','status-progress'], done:['완료','status-done']};
    const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    const DOWS = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];

    /* ══════════════════════════════════════════════
       📌 초기화
    ══════════════════════════════════════════════ */
    function init() {
        const now = new Date();
        currentYear = now.getFullYear(); currentMonth = now.getMonth();
        miniYear = currentYear; miniMonth = currentMonth;
        selectedDate = fmt(currentYear, currentMonth, now.getDate());

        // 구글시트 URL 복원
        if (GAS_URL) {
            document.getElementById('gasUrl').value = GAS_URL;
            document.getElementById('statusDot').className = 'status-dot connected';
            document.getElementById('statusText').textContent = '연결됨 ✓';
        }

        // 샘플 데이터
        if (events.length === 0 && !GAS_URL) {
            const y = now.getFullYear(), m = now.getMonth(), d = now.getDate();
            events = [
                { id:1, date:fmt(y,m,d), title:'팀 회의', start:'09:00', end:'10:00', desc:'주간 업무 보고', color:'blue', status:'progress' },
                { id:2, date:fmt(y,m,d), title:'점심 미팅', start:'12:00', end:'13:00', desc:'거래처 미팅', color:'green', status:'todo' },
                { id:3, date:fmt(y,m,d+1), title:'프로젝트 마감', start:'18:00', end:'19:00', desc:'최종 보고서 제출', color:'red', status:'todo' },
                { id:4, date:fmt(y,m,d+2), title:'디자인 리뷰', start:'14:00', end:'15:30', desc:'UI/UX 검토', color:'purple', status:'todo' },
                { id:5, date:fmt(y,m,d-1), title:'코드 리뷰', start:'10:00', end:'11:00', desc:'PR 머지', color:'blue', status:'done' },
                { id:6, date:fmt(y,m,d+4), title:'워크샵', start:'09:00', end:'17:00', desc:'팀 빌딩', color:'yellow', status:'todo' },
            ];
            saveData();
        }
        renderAll();

        // 자동 동기화
        if (GAS_URL) setTimeout(syncFromSheet, 1000);
    }

    function renderAll() { renderMiniCal(); renderMainCal(); renderTodaySchedule(); renderStats(); }

    /* ══════════════════════════════════════════════
       📌 미니 캘린더
    ══════════════════════════════════════════════ */
    function renderMiniCal() {
        document.getElementById('miniCalTitle').textContent = `${miniYear}년 ${MONTHS[miniMonth]}`;
        const grid = document.getElementById('miniCalGrid');
        const todayStr = fmt(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());
        let html = ['일','월','화','수','목','금','토'].map(d => `<div class="mini-cal-dow">${d}</div>`).join('');
        const first = new Date(miniYear, miniMonth, 1);
        const lastDay = new Date(miniYear, miniMonth+1, 0).getDate();
        const startDow = first.getDay();
        const prevLast = new Date(miniYear, miniMonth, 0).getDate();

        for (let i = startDow-1; i >= 0; i--) html += `<div class="mini-cal-day other-month">${prevLast-i}</div>`;
        for (let d = 1; d <= lastDay; d++) {
            const ds = fmt(miniYear, miniMonth, d);
            const cls = ['mini-cal-day', ds===todayStr?'today':'', ds===selectedDate?'selected':''].filter(Boolean).join(' ');
            const evts = getEvents(ds);
            let dots = evts.length ? '<div class="dot-indicator">' + evts.slice(0,3).map(e=>`<div class="mini-dot" style="background:${COLORS[e.color]||COLORS.blue}"></div>`).join('') + '</div>' : '';
            html += `<div class="${cls}" onclick="selectDate('${ds}')">${d}${dots}</div>`;
        }
        const rem = (7 - (startDow + lastDay) % 7) % 7;
        for (let d = 1; d <= rem; d++) html += `<div class="mini-cal-day other-month">${d}</div>`;
        grid.innerHTML = html;
    }
    function miniCalNav(dir) { miniMonth+=dir; if(miniMonth<0){miniMonth=11;miniYear--} if(miniMonth>11){miniMonth=0;miniYear++} renderMiniCal(); }

    /* ══════════════════════════════════════════════
       📌 메인 캘린더
    ══════════════════════════════════════════════ */
    function renderMainCal() {
        document.getElementById('calTitle').textContent = `${currentYear}년 ${MONTHS[currentMonth]}`;
        if (currentView==='month') renderMonthView(); else renderWeekView();
    }

    function renderMonthView() {
        document.getElementById('monthView').style.display = 'block';
        document.getElementById('weekView').className = 'week-view';
        const grid = document.getElementById('calGrid');
        const todayStr = fmt(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());
        const first = new Date(currentYear, currentMonth, 1);
        const lastDay = new Date(currentYear, currentMonth+1, 0).getDate();
        const startDow = first.getDay();
        let html = '';
        const prevLast = new Date(currentYear, currentMonth, 0).getDate();

        for (let i = startDow-1; i >= 0; i--) {
            const d = prevLast-i;
            html += `<div class="calendar-day other-month"><div class="day-number">${d}</div></div>`;
        }
        for (let d = 1; d <= lastDay; d++) {
            const ds = fmt(currentYear, currentMonth, d);
            const isToday = ds===todayStr, isSel = ds===selectedDate;
            const cls = ['calendar-day', isToday?'today':'', isSel?'selected':''].filter(Boolean).join(' ');
            const evts = getEvents(ds);
            let evtHtml = evts.slice(0,3).map(e => `<div class="event-pill color-${e.color}" onclick="event.stopPropagation();showEventDetail(${e.id})">${e.title}</div>`).join('');
            if (evts.length>3) evtHtml += `<div class="more-events">+${evts.length-3}개</div>`;
            html += `<div class="${cls}" onclick="selectDate('${ds}')">
                <div class="day-number">${isToday?`<span>${d}</span>`:d}</div>${evtHtml}</div>`;
        }
        const rem = (7 - (startDow+lastDay)%7)%7;
        for (let d=1;d<=rem;d++) html+=`<div class="calendar-day other-month"><div class="day-number">${d}</div></div>`;
        grid.innerHTML = html;
    }

    function renderWeekView() {
        document.getElementById('monthView').style.display = 'none';
        document.getElementById('weekView').className = 'week-view active';
        const sp = selectedDate.split('-');
        const sel = new Date(+sp[0], +sp[1]-1, +sp[2]);
        const sow = new Date(sel); sow.setDate(sel.getDate()-sel.getDay());
        const todayStr = fmt(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());
        const dows = ['일','월','화','수','목','금','토'];
        let html = '<div></div>';
        for (let i=0;i<7;i++) {
            const d = new Date(sow); d.setDate(sow.getDate()+i);
            const ds = fmt(d.getFullYear(),d.getMonth(),d.getDate());
            html += `<div class="week-day-header ${ds===todayStr?'today':''}">${dows[i]}<br>${d.getDate()}</div>`;
        }
        for (let h=8;h<=20;h++) {
            html += `<div class="week-time-label">${String(h).padStart(2,'0')}:00</div>`;
            for (let i=0;i<7;i++) {
                const d = new Date(sow); d.setDate(sow.getDate()+i);
                const ds = fmt(d.getFullYear(),d.getMonth(),d.getDate());
                const evts = getEvents(ds).filter(e => parseInt(e.start)===h);
                const eh = evts.map(e=>`<div class="event-pill color-${e.color}" style="font-size:9px" onclick="showEventDetail(${e.id})">${e.title}</div>`).join('');
                html += `<div class="week-cell" onclick="selectDate('${ds}')">${eh}</div>`;
            }
        }
        document.getElementById('weekGrid').innerHTML = html;
    }

    /* ══════════════════════════════════════════════
       📌 사이드바
    ══════════════════════════════════════════════ */
    function renderTodaySchedule() {
        const todayStr = fmt(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());
        const evts = getEvents(todayStr);
        const c = document.getElementById('todaySchedule');
        if (!evts.length) { c.innerHTML = '<div style="text-align:center;padding:16px;color:var(--text-light);font-size:13px;"><i class="fas fa-coffee" style="font-size:24px;display:block;margin-bottom:8px;opacity:0.5;"></i>오늘은 일정이 없어요 ☕</div>'; return; }
        c.innerHTML = evts.map(e => `<div class="today-schedule-item" onclick="showEventDetail(${e.id})"><div class="schedule-time-badge">${e.start}</div><div class="schedule-info"><h4>${e.title}</h4><p>${e.desc||''}</p></div></div>`).join('');
    }

    function renderStats() {
        const me = events.filter(e => { const [y,m]=e.date.split('-'); return +y===currentYear && +m===currentMonth+1; });
        const t=me.filter(e=>e.status==='todo').length, p=me.filter(e=>e.status==='progress').length, d=me.filter(e=>e.status==='done').length;
        document.getElementById('statsRow').innerHTML = `
            <div class="stat-item"><div class="stat-num" style="color:var(--warning)">${t}</div><div class="stat-label">예정</div></div>
            <div class="stat-item"><div class="stat-num" style="color:var(--primary)">${p}</div><div class="stat-label">진행중</div></div>
            <div class="stat-item"><div class="stat-num" style="color:var(--success)">${d}</div><div class="stat-label">완료</div></div>`;
    }

    /* ══════════════════════════════════════════════
       📌 날짜 모달
    ══════════════════════════════════════════════ */
    function selectDate(ds) { selectedDate = ds; renderAll(); openDayModal(ds); }

    function openDayModal(ds) {
        const [y,m,d] = ds.split('-');
        const date = new Date(+y,+m-1,+d);
        document.getElementById('modalDate').textContent = +d;
        document.getElementById('modalDayLabel').textContent = `${+y}년 ${MONTHS[+m-1]} ${DOWS[date.getDay()]}`;
        const evts = getEvents(ds);
        let html = '';
        if (!evts.length) {
            html = '<div style="text-align:center;padding:30px;color:var(--text-light);"><i class="fas fa-calendar-plus" style="font-size:32px;display:block;margin-bottom:12px;opacity:0.5;"></i><p>등록된 일정이 없습니다</p></div>';
        } else {
            html = `<div class="modal-section-title"><i class="fas fa-list"></i> 일정 ${evts.length}건</div>`;
            evts.forEach(e => {
                const [sl,sc] = STATUS_MAP[e.status]||STATUS_MAP.todo;
                html += `<div class="modal-event" onclick="showEventDetail(${e.id})">
                    <div class="modal-event-color" style="background:${COLORS[e.color]||COLORS.blue}"></div>
                    <div class="modal-event-content">
                        <div class="modal-event-title">${e.title}</div>
                        <div class="modal-event-time"><i class="far fa-clock"></i> ${e.start} ~ ${e.end}</div>
                        ${e.desc?`<div class="modal-event-desc">${e.desc}</div>`:''}
                        <span class="modal-event-status ${sc}">${sl}</span>
                    </div></div>`;
            });
        }
        document.getElementById('modalBody').innerHTML = html;
        document.getElementById('eventForm').classList.remove('show');
        document.getElementById('modalOverlay').classList.add('show');
    }
    function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

    /* ══════════════════════════════════════════════
       📌 이벤트 상세
    ══════════════════════════════════════════════ */
    function showEventDetail(id) {
        viewingEventId = id;
        const e = events.find(ev=>ev.id===id); if(!e) return;
        closeModal();
        const [sl,sc] = STATUS_MAP[e.status]||STATUS_MAP.todo;
        const [y,m,d] = e.date.split('-');
        document.getElementById('eventDetailHeader').innerHTML = `
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
                <div style="width:12px;height:12px;border-radius:50%;background:${COLORS[e.color]}"></div>
                <div class="modal-date" style="font-size:22px;">${e.title}</div>
            </div><div class="modal-day-label">${+y}년 ${+m}월 ${+d}일</div>`;
        document.getElementById('eventDetailBody').innerHTML = `
            <div style="background:var(--bg);border-radius:12px;padding:16px;margin-bottom:12px;">
                <div style="font-size:12px;font-weight:700;color:var(--text-light);margin-bottom:8px;"><i class="far fa-clock"></i> 시간</div>
                <div style="font-size:16px;font-weight:700;">${e.start} ~ ${e.end}</div>
            </div>
            ${e.desc?`<div style="background:var(--bg);border-radius:12px;padding:16px;margin-bottom:12px;">
                <div style="font-size:12px;font-weight:700;color:var(--text-light);margin-bottom:8px;"><i class="fas fa-align-left"></i> 설명</div>
                <div style="font-size:14px;line-height:1.6;">${e.desc}</div></div>`:''}
            <div style="background:var(--bg);border-radius:12px;padding:16px;">
                <div style="font-size:12px;font-weight:700;color:var(--text-light);margin-bottom:8px;"><i class="fas fa-flag"></i> 상태</div>
                <span class="modal-event-status ${sc}" style="font-size:13px;padding:5px 12px;">${sl}</span>
                <div style="display:flex;gap:6px;margin-top:10px;">
                    <button onclick="changeStatus(${e.id},'todo')" style="padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:${e.status==='todo'?'#fff3bf':'transparent'};cursor:pointer;font-size:12px;">예정</button>
                    <button onclick="changeStatus(${e.id},'progress')" style="padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:${e.status==='progress'?'#dbe4ff':'transparent'};cursor:pointer;font-size:12px;">진행중</button>
                    <button onclick="changeStatus(${e.id},'done')" style="padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:${e.status==='done'?'#d3f9d8':'transparent'};cursor:pointer;font-size:12px;">완료</button>
                </div>
            </div>`;
        document.getElementById('eventDetailOverlay').classList.add('show');
    }

    function changeStatus(id, status) {
        const e = events.find(ev=>ev.id===id);
        if(e) { e.status=status; saveData(); syncToSheet('update',{id,status}); showEventDetail(id); renderAll(); showToast('상태 변경됨'); }
    }

    function deleteEvent() {
        if(viewingEventId && confirm('삭제하시겠습니까?')) {
            syncToSheet('delete',{id:viewingEventId});
            events=events.filter(e=>e.id!==viewingEventId);
            saveData(); closeEventDetailModal(); renderAll(); showToast('삭제됨 🗑️');
        }
    }
    function closeEventDetailModal() { document.getElementById('eventDetailOverlay').classList.remove('show'); }

    /* ══════════════════════════════════════════════
       📌 일정 추가
    ══════════════════════════════════════════════ */
    function openAddModal() {
        if(!selectedDate) { const n=new Date(); selectedDate=fmt(n.getFullYear(),n.getMonth(),n.getDate()); }
        openDayModal(selectedDate);
        setTimeout(()=>toggleEventForm(),300);
    }
    function toggleEventForm() { document.getElementById('eventForm').classList.toggle('show'); }
    function pickColor(el) { document.querySelectorAll('.color-opt').forEach(c=>c.classList.remove('selected')); el.classList.add('selected'); selectedColor=el.dataset.color; }

    function saveEvent() {
        const title = document.getElementById('formTitle').value.trim();
        if(!title) { showToast('제목을 입력하세요'); return; }
        const ne = {
            id: Date.now(), date: selectedDate, title,
            start: document.getElementById('formStart').value,
            end: document.getElementById('formEnd').value,
            desc: document.getElementById('formDesc').value,
            color: selectedColor,
            status: document.getElementById('formStatus').value
        };
        events.push(ne); saveData();
        syncToSheet('write', ne);
        document.getElementById('formTitle').value='';
        document.getElementById('formDesc').value='';
        toggleEventForm(); openDayModal(selectedDate); renderAll();
        showToast('일정 추가됨! 🎉');
    }

    /* ══════════════════════════════════════════════
       📌 네비게이션 & UI
    ══════════════════════════════════════════════ */
    function calNav(dir) {
        currentMonth+=dir;
        if(currentMonth<0){currentMonth=11;currentYear--} if(currentMonth>11){currentMonth=0;currentYear++}
        miniYear=currentYear; miniMonth=currentMonth; renderAll();
    }
    function goToday() {
        const n=new Date(); currentYear=n.getFullYear(); currentMonth=n.getMonth();
        miniYear=currentYear; miniMonth=currentMonth;
        selectedDate=fmt(currentYear,currentMonth,n.getDate()); renderAll();
    }
    function setView(v,btn) { currentView=v; document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active')); btn.classList.add('active'); renderMainCal(); }

    function toggleWidget() {
        document.body.classList.toggle('widget-mode');
        document.getElementById('widgetBtn').classList.toggle('active');
        showToast(document.body.classList.contains('widget-mode')?'위젯 모드 ON 🪟':'위젯 모드 OFF');
    }
    function toggleDark() {
        document.body.classList.toggle('dark');
        const dk=document.body.classList.contains('dark');
        document.getElementById('darkBtn').innerHTML=dk?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>';
        localStorage.setItem('darkMode', dk);
        showToast(dk?'다크 모드 🌙':'라이트 모드 ☀️');
    }
    function switchTab(tab, btn) {
        document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
        btn.classList.add('active');
        const sb=document.getElementById('sidebar'), mc=document.querySelector('.main-content');
        if(tab==='cal'){mc.style.display='block';sb.classList.add('sidebar-mobile-hidden');}
        else{mc.style.display='none';sb.classList.remove('sidebar-mobile-hidden');}
    }
    function showToast(msg) {
        const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
        setTimeout(()=>t.classList.remove('show'),2500);
    }

    // 다크모드 복원
    if(localStorage.getItem('darkMode')==='true') { document.body.classList.add('dark'); document.getElementById('darkBtn').innerHTML='<i class="fas fa-sun"></i>'; }

    init();
    </script>
</body>
</html>
